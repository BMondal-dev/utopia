services:
  app:
    build:
      context: .
      target: development
    ports:
      - "8080:8080"
    volumes:
      - ./src:/usr/src/code/src
      - ./app:/usr/src/code/app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-utopia}
      - DB_USER=${DB_USER:-utopia}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-utopia}
      POSTGRES_USER: ${DB_USER:-utopia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-utopia} -d ${DB_NAME:-utopia}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
